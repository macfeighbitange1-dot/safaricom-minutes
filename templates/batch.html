<!DOCTYPE html>
<html>
<head>
    <title>Batch M-Pesa Payment</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 shadow rounded" style="max-width: 500px;">
        <h2>Batch Payment</h2>
        <p class="text-muted">Upload a .txt file with one phone number per line.</p>
        
        <form action="/upload_batch" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Select .txt file</label>
                <input type="file" name="file" class="form-control" accept=".txt" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Amount per person</label>
                <input type="number" name="amount" class="form-control" value="1" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Send STK Prompts</button>
        </form>
    </div>
</body>
</html>
