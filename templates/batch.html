<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch M-Pesa Payment - Pro Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .progress { height: 30px; border-radius: 15px; }
        #statusBadge { font-size: 1rem; padding: 8px 15px; }
        .log-container {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            background: #f8f9fa;
        }
        .table-sm { font-size: 0.85rem; }
        .sticky-top { background: #fff; z-index: 10; }
    </style>
</head>
<body class="bg-light p-4">
    <div class="container bg-white p-4 shadow rounded" style="max-width: 800px;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="text-success mb-0">Batch Payment Dashboard</h2>
            <span id="statusBadge" class="badge bg-secondary">System Idle</span>
        </div>
        
        <p class="text-muted">Process up to 100,000 numbers with automated cooldowns and jitter.</p>
        
        <form id="uploadForm" class="row g-3">
            <div class="col-md-7">
                <label class="form-label font-weight-bold">Phone Numbers (.txt)</label>
                <input type="file" id="fileInput" name="file" class="form-control" accept=".txt" required>
            </div>
            <div class="col-md-5">
                <label class="form-label">Amount (KES)</label>
                <input type="number" id="amountInput" name="amount" class="form-control" value="1" required>
            </div>
            <div class="col-12">
                <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-2 shadow-sm">🚀 Start Bulk Processing</button>
            </div>
        </form>

        <div id="progressSection" class="mt-4 d-none">
            <div class="row text-center mb-3">
                <div class="col-4 border-end">
                    <small class="text-muted d-block">Total</small>
                    <strong id="totalCount" class="h4">0</strong>
                </div>
                <div class="col-4 border-end">
                    <small class="text-muted d-block">Processed</small>
                    <strong id="currentCount" class="h4 text-primary">0</strong>
                </div>
                <div class="col-4">
                    <small class="text-muted d-block">Completion</small>
                    <strong id="percentText" class="h4 text-success">0%</strong>
                </div>
            </div>
            
            <div class="progress mb-4">
                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%"></div>
            </div>

            <h5 class="mb-2">Live Activity Log</h5>
            <div class="log-container">
                <table class="table table-sm table-hover mb-0">
                    <thead class="table-dark sticky-top">
                        <tr>
                            <th>Phone Number</th>
                            <th>Status</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="logBody">
                        </tbody>
                </table>
            </div>
            <div class="mt-2 d-flex justify-content-between">
                <small class="text-muted">Autoscrolling to latest activity...</small>
                <button onclick="location.reload()" class="btn btn-sm btn-outline-danger">Reset Dashboard</button>
            </div>
        </div>
    </div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const progressSection = document.getElementById('progressSection');
        const progressBar = document.getElementById('progressBar');
        const statusBadge = document.getElementById('statusBadge');
        const currentCount = document.getElementById('currentCount');
        const totalCount = document.getElementById('totalCount');
        const percentText = document.getElementById('percentText');
        const logBody = document.getElementById('logBody');

        let lastProcessedIndex = 0;

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('file', document.getElementById('fileInput').files[0]);
            formData.append('amount', document.getElementById('amountInput').value);

            document.getElementById('submitBtn').disabled = true;
            progressSection.classList.remove('d-none');

            try {
                const response = await fetch('/upload_batch', { method: 'POST', body: formData });
                const result = await response.json();
                
                if (result.status === 'started') {
                    setInterval(updateProgress, 2000);
                }
            } catch (error) {
                alert("Critical Error: " + error);
            }
        });

        async function updateProgress() {
            try {
                const response = await fetch('/batch_progress');
                const data = await response.json();
                
                // Update Stats
                const percent = data.total > 0 ? Math.round((data.current / data.total) * 100) : 0;
                progressBar.style.width = percent + '%';
                percentText.innerText = percent + '%';
                currentCount.innerText = data.current;
                totalCount.innerText = data.total;
                statusBadge.innerText = data.status;

                // Update UI Colors based on status
                if (data.status.includes('Cooling')) {
                    statusBadge.className = "badge bg-warning text-dark";
                } else if (data.status === 'Complete') {
                    statusBadge.className = "badge bg-success";
                    progressBar.classList.remove('progress-bar-animated');
                } else {
                    statusBadge.className = "badge bg-info text-dark";
                }

                // Add new logs to the table
                if (data.logs && data.logs.length > lastProcessedIndex) {
                    for (let i = lastProcessedIndex; i < data.logs.length; i++) {
                        const log = data.logs[i];
                        const row = logBody.insertRow(0); // Insert at top
                        const statusClass = log.status === 'Sent' ? 'bg-success' : 'bg-danger';
                        
                        row.innerHTML = `
                            <td>${log.phone}</td>
                            <td><span class="badge ${statusClass}">${log.status}</span></td>
                            <td class="text-muted">${log.time}</td>
                        `;
                    }
                    lastProcessedIndex = data.logs.length;
                }
            } catch (error) {
                console.error("Polling error:", error);
            }
        }
    </script>
</body>
</html>
